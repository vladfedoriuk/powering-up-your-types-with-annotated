[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-added-large-files" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-json" },
  { id = "pretty-format-json", args = ["--autofix"] },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.18"
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.23"
hooks = [
  { id = "uv-lock" },
]

[[repos]]
repo = "https://github.com/tox-dev/pyproject-fmt"
rev = "v2.25.0"
hooks = [
  { id = "pyproject-fmt", args = ["--indent=4"] },
]

[[repos]]
repo = "https://github.com/executablebooks/mdformat"
rev = "1.0.0"
hooks = [
  { id = "mdformat", additional_dependencies = ["mdformat-ruff"], args = ["--number"], exclude = "^presentation/|.agents/" },
]

[[repos]]
repo = "https://github.com/google/yamlfmt"
rev = "v0.21.0"
hooks = [
  { id = "yamlfmt" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "mypy", name = "mypy", entry = "uv run mypy", language = "system", types = ["python"] },
  { id = "just-fmt", name = "just-fmt", entry = "just --unstable --fmt", language = "system", pass_filenames = false },
]
